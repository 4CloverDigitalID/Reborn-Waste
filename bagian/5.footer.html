<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Footer - Reborn Waste</title>
  <!-- Tailwind CSS v4 -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>
<body class="bg-[#105d3b] min-h-screen flex flex-col justify-end">

  <!-- Footer Section -->
  <footer class="relative w-full mt-24 pt-20 pb-8 rounded-t-[40px] md:rounded-t-[60px] bg-gradient-to-br from-[#e8faf0] via-[#e2faf0] to-[#c1f5d8] shadow-[0_-15px_50px_rgba(0,0,0,0.1)]">
    
    <!-- Centered Overlapping Logo Pill -->
    <div class="absolute -top-8 left-1/2 -translate-x-1/2 bg-white px-8 py-3.5 rounded-full shadow-[0_10px_35px_rgba(16,93,59,0.15)] flex items-center gap-3 border border-[#c1f5d8] transition-transform duration-300 hover:scale-105">
      <img src="img/logo.svg" alt="" class="w-10 h-10">
      <span class="text-xl font-bold tracking-wide text-[#0a402a]">ReBorn Waste</span>
    </div>

    <!-- Main Footer Grid -->
    <div class="max-w-6xl mx-auto px-6 md:px-12 grid grid-cols-1 md:grid-cols-12 gap-10 md:gap-8">
      
      <!-- Left Column: Headline and Action Buttons -->
      <div class="col-span-1 md:col-span-6 flex flex-col items-start justify-center gap-6">
        <h2 class="text-3xl sm:text-4xl md:text-5xl font-semibold tracking-tight text-[#0a402a] leading-tight">
          Mulai Dari<br>Dirimu Sekarang
        </h2>
        <div class="flex flex-wrap items-center gap-4">
          <a href="#contact" id="footer-btn-contact" class="px-7 py-3 bg-[#0a402a] text-white text-sm font-medium rounded-full shadow-md hover:bg-[#072c1c] hover:shadow-lg hover:-translate-y-0.5 transition-all duration-300">
            Contact
          </a>
          <a href="#send-message" id="footer-btn-message" class="px-7 py-3 bg-[#c6f6df] text-[#0a402a] text-sm font-medium rounded-full shadow-sm hover:bg-[#b0ecd0] hover:shadow-md hover:-translate-y-0.5 transition-all duration-300">
            Send Message
          </a>
        </div>
      </div>

      <!-- Center Column: Navigate -->
      <div class="col-span-1 sm:col-span-6 md:col-span-3 flex flex-col items-start gap-5">
        <h3 class="text-lg font-bold text-[#0a402a] tracking-wide">Navigate</h3>
        <ul class="flex flex-col gap-3.5 w-full">
          <li class="flex items-center gap-3 text-sm font-medium text-[#0a402a]/80 hover:text-[#0a402a] transition-all hover:translate-x-1.5 duration-250">
            <span class="w-1.5 h-1.5 rounded-full bg-[#0a402a] shrink-0"></span>
            <a href="../index.html" id="nav-link-home" class="w-full">Home</a>
          </li>
          <li class="flex items-center gap-3 text-sm font-medium text-[#0a402a]/80 hover:text-[#0a402a] transition-all hover:translate-x-1.5 duration-250">
            <span class="w-1.5 h-1.5 rounded-full bg-[#0a402a] shrink-0"></span>
            <a href="../index.html#about" id="nav-link-about" class="w-full">About</a>
          </li>
          <li class="flex items-center gap-3 text-sm font-medium text-[#0a402a]/80 hover:text-[#0a402a] transition-all hover:translate-x-1.5 duration-250">
            <span class="w-1.5 h-1.5 rounded-full bg-[#0a402a] shrink-0"></span>
            <a href="1.belajar.html" id="nav-link-pilah" class="w-full">Pilah</a>
          </li>
          <li class="flex items-center gap-3 text-sm font-medium text-[#0a402a]/80 hover:text-[#0a402a] transition-all hover:translate-x-1.5 duration-250">
            <span class="w-1.5 h-1.5 rounded-full bg-[#0a402a] shrink-0"></span>
            <a href="2.data.html" id="nav-link-data" class="w-full">Data</a>
          </li>
          <li class="flex items-center gap-3 text-sm font-medium text-[#0a402a]/80 hover:text-[#0a402a] transition-all hover:translate-x-1.5 duration-250">
            <span class="w-1.5 h-1.5 rounded-full bg-[#0a402a] shrink-0"></span>
            <a href="3.Edukasi.html" id="nav-link-video" class="w-full">Video</a>
          </li>
        </ul>
      </div>

      <!-- Right Column: Company -->
      <div class="col-span-1 sm:col-span-6 md:col-span-3 flex flex-col items-start gap-5">
        <h3 class="text-lg font-bold text-[#0a402a] tracking-wide">Company</h3>
        <ul class="flex flex-col gap-3.5 w-full">
          <li class="flex items-center gap-3 text-sm font-medium text-[#0a402a]/80 hover:text-[#0a402a] transition-all hover:translate-x-1.5 duration-250">
            <span class="w-1.5 h-1.5 rounded-full bg-[#0a402a] shrink-0"></span>
            <a href="#project" id="company-link-project" class="w-full">Project</a>
          </li>
          <li class="flex items-center gap-3 text-sm font-medium text-[#0a402a]/80 hover:text-[#0a402a] transition-all hover:translate-x-1.5 duration-250">
            <span class="w-1.5 h-1.5 rounded-full bg-[#0a402a] shrink-0"></span>
            <a href="#contact-section" id="company-link-contact" class="w-full">Contact</a>
          </li>
          <li class="flex items-center gap-3 text-sm font-medium text-[#0a402a]/80 hover:text-[#0a402a] transition-all hover:translate-x-1.5 duration-250">
            <span class="w-1.5 h-1.5 rounded-full bg-[#0a402a] shrink-0"></span>
            <a href="#opensource" id="company-link-open" class="w-full">Open Source</a>
          </li>
          <li class="flex items-center gap-3 text-sm font-medium text-[#0a402a]/80 hover:text-[#0a402a] transition-all hover:translate-x-1.5 duration-250">
            <span class="w-1.5 h-1.5 rounded-full bg-[#0a402a] shrink-0"></span>
            <a href="#blog" id="company-link-blog" class="w-full">Blog</a>
          </li>
        </ul>
      </div>

    </div>

    <!-- Bottom Bar (Divider & Legal/Socials) -->
    <div class="max-w-6xl mx-auto px-6 md:px-12 mt-16 pt-8 border-t border-[#0a402a]/15 flex flex-col sm:flex-row items-center justify-between gap-6">
      
      <!-- Copyright Info -->
      <span class="text-xs text-[#0a402a]/60 text-center sm:text-left font-medium tracking-wide">
        &copy; Halo-lab. All rights reserved
      </span>

      <!-- Social Media Icons -->
      <div class="flex items-center gap-4">
        <!-- Instagram -->
        <a href="#instagram" id="social-instagram" aria-label="Instagram" class="w-9 h-9 border border-[#0a402a]/30 rounded-full flex items-center justify-center text-[#0a402a] hover:bg-[#0a402a] hover:text-white hover:border-[#0a402a] hover:scale-105 transition-all duration-300">
          <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24">

          </svg>
        </a>
        
        <!-- WhatsApp -->
        <a href="#whatsapp" id="social-whatsapp" aria-label="WhatsApp" class="w-9 h-9 border border-[#0a402a]/30 rounded-full flex items-center justify-center text-[#0a402a] hover:bg-[#0a402a] hover:text-white hover:border-[#0a402a] hover:scale-105 transition-all duration-300">
          <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24">
            <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.514 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.502-5.724-1.455L0 24zm6.59-4.846c1.6.95 2.766 1.498 4.796 1.499 5.229 0 9.483-4.259 9.485-9.493.002-2.535-.985-4.917-2.779-6.713-1.793-1.796-4.17-2.784-6.712-2.785-5.234 0-9.49 4.259-9.492 9.494-.001 2.062.536 3.072 1.534 4.803l-.997 3.642 3.86-.988-.135-.067zM17.15 14.77c-.285-.143-1.687-.832-1.947-.927-.26-.096-.45-.143-.639.143-.19.285-.733.927-.899 1.117-.166.19-.332.214-.617.071-.285-.143-1.204-.444-2.293-1.415-.848-.756-1.42-1.69-1.587-1.975-.166-.285-.018-.44.125-.581.128-.127.285-.332.427-.499.143-.166.19-.285.285-.475.095-.19.047-.356-.024-.499-.071-.143-.639-1.537-.876-2.108-.23-.553-.465-.477-.639-.486-.165-.008-.355-.01-.545-.01-.19 0-.5.071-.762.356-.262.285-1 .976-1 2.38 0 1.403 1.02 2.76 1.163 2.95.143.19 2.01 3.07 4.869 4.298.68.293 1.213.468 1.628.6.684.217 1.307.186 1.8.113.548-.082 1.687-.69 1.924-1.357.238-.667.238-1.238.166-1.357-.07-.119-.26-.19-.546-.333z"/>
          </svg>
        </a>

        <!-- Email / Mail -->
        <a href="mailto:info@rebornwaste.com" id="social-email" aria-label="Email" class="w-9 h-9 border border-[#0a402a]/30 rounded-full flex items-center justify-center text-[#0a402a] hover:bg-[#0a402a] hover:text-white hover:border-[#0a402a] hover:scale-105 transition-all duration-300">
          <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24">
            <path d="M0 3v18h24v-18h-24zm21.518 2l-9.518 7.713-9.518-7.713h19.036zm-19.518 14v-11.817l10 8.104 10-8.104v11.817h-20z"/>
          </svg>
        </a>

        <!-- Facebook -->
        <a href="#facebook" id="social-facebook" aria-label="Facebook" class="w-9 h-9 border border-[#0a402a]/30 rounded-full flex items-center justify-center text-[#0a402a] hover:bg-[#0a402a] hover:text-white hover:border-[#0a402a] hover:scale-105 transition-all duration-300">
          <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24">
            <path d="M9 8h-3v4h3v12h5v-12h3.642l.358-4h-4v-1.667c0-.955.192-1.333 1.115-1.333h2.885v-5h-3.808c-3.596 0-5.192 1.583-5.192 4.615v3.385z"/>
          </svg>
        </a>
      </div>

    </div>

  </footer>

</body>
</html>
